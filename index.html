<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>フランジ ボルト穴 作図ツール</title>
<style>
  :root { --bg:#f5f6f8; --panel:#ffffff; --line:#222; --accent:#2563eb; }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: "Segoe UI", "Meiryo", sans-serif;
    background: var(--bg); color: #1a1a1a;
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh; padding: 24px;
  }
  h1 { font-size: 20px; margin: 0 0 16px; }
  .panel {
    background: var(--panel); border-radius: 12px;
    box-shadow: 0 2px 10px rgba(0,0,0,.08);
    padding: 18px 22px; margin-bottom: 18px;
    display: flex; flex-wrap: wrap; gap: 18px; align-items: flex-end;
  }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 12px; color: #555; }
  .field input {
    width: 130px; padding: 8px 10px; font-size: 15px;
    border: 1px solid #cbd2dc; border-radius: 8px;
  }
  .field label.checkbox {
    display: flex; align-items: center; gap: 6px;
    font-size: 15px; color: #1a1a1a; height: 38px; cursor: pointer;
  }
  .field label.checkbox input { width: auto; }
  button {
    padding: 9px 18px; font-size: 14px; font-weight: 600;
    border: none; border-radius: 8px; cursor: pointer;
    background: var(--accent); color: #fff;
  }
  button.secondary { background: #6b7280; }
  button:hover { opacity: .9; }
  canvas { background: #fff; border-radius: 12px; box-shadow: 0 2px 10px rgba(0,0,0,.08); }
  .hint { font-size: 12px; color: #777; margin-top: 4px; }
</style>
</head>
<body>
  <h1>フランジ ボルト穴 作図ツール</h1>

  <div class="panel">
    <div class="field">
      <label for="outerDia">外径（直径 mm）</label>
      <input id="outerDia" type="number" min="1" step="1" value="600">
    </div>
    <div class="field">
      <label for="innerDia">内径（直径 mm）</label>
      <input id="innerDia" type="number" min="1" step="1" value="350">
    </div>
    <div class="field">
      <label for="gasketDia">ガスケット面（直径 mm）</label>
      <input id="gasketDia" type="number" min="1" step="1" value="490">
    </div>
    <div class="field">
      <label for="boltCount">ボルトの数</label>
      <input id="boltCount" type="number" min="1" max="200" step="1" value="12">
    </div>
    <div class="field">
      <label for="holeSize">ボルト穴（直径 mm）</label>
      <input id="holeSize" type="number" min="0.5" step="0.5" value="32">
    </div>
    <div class="field">
      <label for="scale">縮尺（px/mm）</label>
      <input id="scale" type="number" min="0.1" step="0.1" value="1">
    </div>
    <div class="field">
      <label for="centerAngle">中心線の開始角度（°）</label>
      <input id="centerAngle" type="number" step="1" value="0">
    </div>
    <div class="field">
      <label for="weldLine">溶接線</label>
      <label class="checkbox"><input id="weldLine" type="checkbox" checked> 表示する</label>
    </div>
    <button id="drawBtn">作図する</button>
    <button id="saveBtn" class="secondary">JPG保存</button>
  </div>

  <canvas id="cv" width="1160" height="660"></canvas>
  <div class="hint">寸法はmm（直径）で入力します。「縮尺」は1mmを何pxで描くかの倍率です（例：縮尺2なら2倍の大きさで描画・保存）。大きすぎる場合は自動で縮小して全体を収めます。先頭の穴は真上＝12時方向です。</div>

<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');

// フランジの中心
const CX = cv.width / 2;          // 中心X
const CY = cv.height / 2;         // 中心Y

function draw(boltCount, holeRadius, rOuter, rInner, showWeld, centerAngleDeg, rGasket) {
  const rBoltCircle = (rOuter + rGasket) / 2; // ボルト穴の中心が乗る円（外径とガスケット面の中間）

  // 背景を白で塗る（JPGは透過を扱えず、透過部分が黒くなって線が見えなくなるため）
  ctx.clearRect(0, 0, cv.width, cv.height);
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, cv.width, cv.height);
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 1.5;

  // 中心線（90°ごとの点線）
  drawCenterLines(rOuter, centerAngleDeg);

  // 外円
  ctx.beginPath();
  ctx.arc(CX, CY, rOuter, 0, Math.PI * 2);
  ctx.stroke();

  // 内円
  ctx.beginPath();
  ctx.arc(CX, CY, rInner, 0, Math.PI * 2);
  ctx.stroke();

  // ガスケット面（内径とボルト穴の間の一周線）
  if (rGasket > 0) {
    ctx.beginPath();
    ctx.arc(CX, CY, rGasket, 0, Math.PI * 2);
    ctx.stroke();
  }

  // 内円のすぐ内側に溶接線（ビード模様）を描く（オンのときだけ）
  if (showWeld) drawWeldLine(rInner);

  // ボルト穴を等間隔で配置
  if (boltCount > 0) {
    for (let i = 0; i < boltCount; i++) {
      // 真上(12時方向 = -90°)を起点に時計回りで等間隔
      const angle = -Math.PI / 2 + (Math.PI * 2 * i) / boltCount;
      const hx = CX + rBoltCircle * Math.cos(angle);
      const hy = CY + rBoltCircle * Math.sin(angle);
      ctx.beginPath();
      ctx.arc(hx, hy, holeRadius, 0, Math.PI * 2);
      ctx.stroke();
    }
  }
}

// 中心から 90°ごとに点線の中心線を引く。
// startDeg は開始角度（真上=12時方向を0°とし、時計回りに度数で指定）。
function drawCenterLines(rOuter, startDeg) {
  const len = rOuter + 12;            // 外円より少し外まで伸ばす
  const startRad = (startDeg || 0) * Math.PI / 180;
  ctx.save();
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 1;
  ctx.setLineDash([8, 6]);           // 点線
  for (let i = 0; i < 4; i++) {
    const angle = -Math.PI / 2 + startRad + (Math.PI / 2) * i; // 真上＋開始角度から90°ずつ
    ctx.beginPath();
    ctx.moveTo(CX, CY);
    ctx.lineTo(CX + len * Math.cos(angle), CY + len * Math.sin(angle));
    ctx.stroke();
  }
  ctx.restore();                     // 点線設定をリセット
}

// 内円のすぐ内側に溶接ビード模様を描く。
// 少し傾けた短い円弧を密に重ねて、ロープ（コイル）状の溶接線にする。
// すべて rInner に比例させているので、内径が変わると模様も一緒に拡縮する。
function drawWeldLine(rInner) {
  const gap  = rInner * 0.008;         // 内円との隙間（できるだけ近づける）
  const bead = rInner * 0.035;         // ビード1個の半径（内径に比例）
  const rWeld = rInner - gap - bead;   // ビード中心が乗る半径
  if (rWeld <= 0 || bead < 0.5) return;

  const slant = Math.PI * 0.25;        // 各ビードの傾き（コイルらしさ）
  // すき間なく重ねて連続したロープに見せる個数
  const count = Math.max(16, Math.round((Math.PI * 2 * rWeld) / (bead * 0.7)));

  ctx.strokeStyle = '#222';
  ctx.lineWidth = 1.2;
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count;
    const x = CX + rWeld * Math.cos(angle);
    const y = CY + rWeld * Math.sin(angle);
    // 傾けた円弧（三日月）を重ねて斜めのビード模様にする
    ctx.beginPath();
    ctx.arc(x, y, bead, angle + slant, angle + slant + Math.PI * 1.15);
    ctx.stroke();
  }
}

function getCount() {
  let n = parseInt(document.getElementById('boltCount').value, 10);
  if (isNaN(n) || n < 0) n = 0;
  if (n > 200) n = 200;
  return n;
}

// 入力値（mm）と縮尺（px/mm）から描画用の寸法（px）を求める
const R_OUTER_MAX = Math.min(cv.width, cv.height) / 2 - 10; // キャンバスに収まる外径半径の上限

function getValue(id, min, fallback) {
  let v = parseFloat(document.getElementById(id).value);
  if (isNaN(v) || v < min) v = fallback;
  return v;
}

function getDimensions() {
  let scale = getValue('scale', 0.1, 1);          // px/mm
  let outerMm = getValue('outerDia', 1, 300);     // 外径 mm
  let innerMm = getValue('innerDia', 1, 200);     // 内径 mm
  let gasketMm = getValue('gasketDia', 1, 230);   // ガスケット面 直径 mm
  let holeMm  = getValue('holeSize', 0.5, 26);    // 穴直径 mm

  // 内径は外径より小さく（最低 5mm 分内側に）
  if (innerMm > outerMm - 5) innerMm = Math.max(1, outerMm - 5);

  // ガスケット面は内径と外径の間に収める（ボルト穴は外径とガスケット面の中間に置く）
  if (gasketMm <= innerMm) gasketMm = innerMm + 1;
  if (gasketMm >= outerMm) gasketMm = outerMm - 1;

  // mm → px に変換
  let rOuter = (outerMm / 2) * scale;
  let rInner = (innerMm / 2) * scale;
  let rGasket = (gasketMm / 2) * scale;
  let holeRadius = (holeMm / 2) * scale;

  // キャンバスからはみ出す場合は縮尺を自動で下げて全体を収める
  if (rOuter > R_OUTER_MAX) {
    const k = R_OUTER_MAX / rOuter;
    rOuter *= k; rInner *= k; rGasket *= k; holeRadius *= k;
  }
  if (holeRadius < 0.5) holeRadius = 0.5;

  return { rOuter, rInner, rGasket, holeRadius };
}

function render() {
  const { rOuter, rInner, rGasket, holeRadius } = getDimensions();
  const showWeld = document.getElementById('weldLine').checked;
  const centerAngle = getValue('centerAngle', -3600, 0);
  draw(getCount(), holeRadius, rOuter, rInner, showWeld, centerAngle, rGasket);
}

document.getElementById('drawBtn').addEventListener('click', render);
document.getElementById('weldLine').addEventListener('change', render);
document.getElementById('centerAngle').addEventListener('change', render);
['outerDia', 'innerDia', 'gasketDia', 'boltCount', 'holeSize', 'scale', 'centerAngle'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => {
    if (e.key === 'Enter') render();
  });
});

document.getElementById('saveBtn').addEventListener('click', () => {
  const n = getCount();
  const { rOuter, rInner, rGasket, holeRadius } = getDimensions();
  const showWeld = document.getElementById('weldLine').checked;
  const centerAngle = getValue('centerAngle', -3600, 0);

  // 保存時はフランジ全体を -開始角度ぶん回転させ、十字（中心線）が
  // 画像の真上・真下・左右と一致するようにする。
  ctx.save();
  ctx.translate(CX, CY);
  ctx.rotate(-centerAngle * Math.PI / 180);
  ctx.translate(-CX, -CY);
  draw(n, holeRadius, rOuter, rInner, showWeld, centerAngle, rGasket);
  ctx.restore();

  const link = document.createElement('a');
  link.download = `ボルト穴${n}個.jpg`;
  link.href = cv.toDataURL('image/jpeg', 0.95);
  link.click();

  // 画面表示は元の角度に戻す
  render();
});

// 初期表示
render();
</script>
</body>
</html>
